<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar · Contact Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center text-slate-800">
  <form method="post" action="/login" class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 w-full max-w-sm">
    <h1 class="text-lg font-semibold mb-1">🎧 Contact Center</h1>
    <p class="text-sm text-slate-500 mb-5">Ingresá para acceder al panel.</p>
    {% if error %}
      <p class="mb-3 text-sm text-rose-600 bg-rose-50 border border-rose-200 rounded-lg px-3 py-2">Usuario o contraseña incorrectos.</p>
    {% endif %}
    <label class="block text-xs font-medium text-slate-600 mb-1">Usuario</label>
    <input name="username" autocomplete="username" autofocus class="w-full border rounded-lg px-3 py-2 text-sm mb-3" required>
    <label class="block text-xs font-medium text-slate-600 mb-1">Contraseña</label>
    <input name="password" type="password" autocomplete="current-password" class="w-full border rounded-lg px-3 py-2 text-sm mb-5" required>
    <button class="w-full bg-indigo-900 hover:bg-indigo-800 text-white text-sm font-medium px-4 py-2 rounded-lg">Ingresar</button>
  </form>
</body>
</html>
